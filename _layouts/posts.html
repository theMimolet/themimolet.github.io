---
layout: default
---

<section class="post-grid">
    {% for post in site.posts %}
    {% if post.lang == page.lang %}
    <a href="{{ post.url }}" class="post">
        <h3>{{ post.title }}</h3>
        {{ post.date | date: site.data.locales[page.lang].date_format }}
        <p>{{ post.summary }}</p>
    </a>
    {% endif %}
    {% endfor %}

</section>
{{ content }}
